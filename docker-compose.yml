# =============================================================================
# EcoSense - Docker Compose Configuration
# Full-stack waste management & recycling tracker platform
# =============================================================================

services:
  # -------------------------------------------------------------------------
  # Backend API - Flask + Socket.IO + MongoDB
  # -------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecosense-backend
    env_file:
      - ./backend/.env
    environment:
      - FLASK_ENV=production
    ports:
      - "5000:5000"
    networks:
      - ecosense-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # -------------------------------------------------------------------------
  # Frontend UI - React + TypeScript (served via Nginx)
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    container_name: ecosense-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - ecosense-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

# -------------------------------------------------------------------------
# Network Configuration
# -------------------------------------------------------------------------
networks:
  ecosense-network:
    driver: bridge
    name: ecosense-network