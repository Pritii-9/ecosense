services:
  backend:
    build:
      context: ./backend
    container_name: ecosense-backend
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    container_name: ecosense-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
